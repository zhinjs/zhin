# Zhin.js 生活助手示例
# 介于 minimal-bot（Sandbox Core）与 test-bot（厨房水槽）之间

log_level: 1

# --- 插件 ---
plugins:
  - "@zhin.js/host-router"
  - "@zhin.js/host-api"
  - "@zhin.js/adapter-sandbox"
  - assistant

# --- Endpoint ---
endpoints:
  - context: sandbox
    name: assistant

# --- HTTP 服务 ---
http:
  port: 8086
  token: "${HTTP_TOKEN}"

# --- AI 配置 ---
ai:
  providers:
    ollama:
      sdk: ollama
      host: "http://localhost:11434"

  agents:
    zhin:
      provider: ollama
      model: qwen3:8b

  # 本地知识库
  knowledge:
    baseDir: knowledge

  # 三层文件记忆（Stable 默认启用）；碎片事实可 opt-in 语义记忆（Advanced）
  memory:
    enabled: true
    semantic:
      enabled: false   # 生活助手推荐默认关；改为 true 启用 memory_search / memory_upsert

  # 触发配置
  trigger:
    respondToAt: true
    respondToPrivate: true
    prefixes: ["ai:", "AI:"]

  # Agent 安全
  agent:
    execSecurity: allowlist
    execApprovalMode: ask
    compaction:
      enabled: true
      auto: true
      keepRecentTokens: 20000
