log_level: 1
database:
  dialect: sqlite
  filename: ./data/test.db
bots:
  - context: icqq
    name: ${ICQQ_ACCOUNT}
    password: ${ICQQ_PASSWORD}
    platform: ${ICQQ_PLATFORM}
    sign_api_addr: ${ICQQ_SIGN_API_ADDR}
    ver: 9.1.70
    data_dir: ./data
    scope: icqqjs
  - context: github
    name: zhin-github
    app_id: ${GITHUB_APP_ID}
    private_key: ./data/zhin-connect.pem
    webhook_secret: ${GITHUB_WEBHOOK_SECRET}
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
plugin_dirs:
  - node_modules
  - ./src/plugins
services:
  - process
  - config
  - command
  - component
  - permission
  - cron
plugins:
  - test-plugin
  - test-jsx
  - "@zhin.js/http"
  - "@zhin.js/console"
  - "@zhin.js/mcp"
  - "@zhin.js/adapter-github"
  - "@zhin.js/adapter-sandbox"
  - "@zhin.js/adapter-kook"
  - "@zhin.js/adapter-milky"
  - "@zhin.js/adapter-satori"
  - "@zhin.js/adapter-onebot11"
  - "@zhin.js/adapter-onebot12"
  - "@zhin.js/adapter-qq"
  - html-test
  - "@zhin.js/plugin-html-renderer"
  - "@zhin.js/plugin-group-daily-analysis"
  - "@zhin.js/plugin-60s"
  - "@zhin.js/plugin-teach"
console:
  enabled: true
  lazyLoad: true
inbox:
  enabled: true
group-daily-analysis:
  analysisDays: 1
  autoAnalysisEnabled: true
  autoAnalysisCron: 0 9 * * *
  enabledGroups: []
  disabledGroups: []
  outputFormat: text
  maxMessagesPerAnalysis: 500
ai:
  enabled: true
  defaultProvider: openai
  session:
    maxHistory: 20
    expireMs: 3600000
  providers:
    ollama:
      host: http://172.25.70.73:11434
      models:
        - qwen3:14b
    openai:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      models:
        - nvidia/moonshotai/kimi-k2.5
  sessions:
    useDatabase: true
    maxHistory: 50
    expireMs: 3600000
  context:
    enabled: true
    maxMessagesBeforeSummary: 100
    summaryRetentionDays: 30
  agent:
    execSecurity: allowlist
    visionModel: qwen2.5vl:7b
    execAllowlist:
      - ls
      - cat
      - echo
      - whoami
      - pwd
      - date
      - cal
      - clear
      - help
      - man
      - info
      - curl
  maxIterations: 100
  trigger:
    enabled: true
    prefixes:
      - "#"
      - "AI:"
      - "ai:"
    respondToAt: true
    respondToPrivate: true
    ignorePrefixes:
      - /
      - "!"
      - ！
    timeout: 120000
htmlRenderer:
  defaultWidth: 1080
  defaultBackgroundColor: "#ffffff"
  cacheFonts: true
60s:
  apiBase: https://services.zhin.dev
http:
  host: 0.0.0.0
  port: 8086
  token: ${HTTP_TOKEN}
  base: /api
teach:
  maxPerGroup: 200
  cooldown: 3000
  allowRegex: true
  pageSize: 10
