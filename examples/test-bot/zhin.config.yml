log_level: 1
database:
  dialect: sqlite
  filename: ./data/test.db

# 消息过滤配置（可选）
# 基于优先级规则的过滤引擎，在 Dispatcher Guardrail 第一阶段拦截
# 文档：https://zhin.js.org/essentials/message-filter
#
# 规则形式（推荐）：
# message_filter:
#   default_policy: allow         # 无规则匹配时的行为
#   rules:
#     - name: block-spam-groups
#       action: deny
#       scopes: [group]
#       channels: ['123456']
#     - name: allow-vip
#       action: allow
#       priority: 100
#       senders: ['admin001']
#     - name: block-test-channels
#       action: deny
#       scopes: [channel]
#       channels: ['/^test-/']     # 支持正则


bots:
  - context: icqq
    name: ${ICQQ_ACCOUNT}
    password: ${ICQQ_PASSWORD}
    platform: ${ICQQ_PLATFORM}
    sign_api_addr: ${ICQQ_SIGN_API_ADDR}
    ver: 9.1.70
    data_dir: ./data
    scope: icqqjs
  - context: github
    name: zhin-github
    app_id: ${GITHUB_APP_ID}
    private_key: ./data/zhin-connect.pem
    webhook_secret: ${GITHUB_WEBHOOK_SECRET}
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
plugin_dirs:
  - node_modules
  - ./src/plugins
services:
  - process
  - config
  - command
  - component
  - permission
  - cron
plugins:
  - test-plugin
  - test-jsx
  - "@zhin.js/http"
  - "@zhin.js/console"
  - "@zhin.js/mcp"
  - "@zhin.js/adapter-github"
  - "@zhin.js/adapter-sandbox"
  - "@zhin.js/adapter-kook"
  - "@zhin.js/adapter-icqq"
  - "@zhin.js/adapter-qq"
  - "@zhin.js/plugin-html-renderer"
  - "@zhin.js/plugin-60s"
  - "@zhin.js/plugin-teach"
console:
  enabled: true
  lazyLoad: true
ai:
  enabled: true
  defaultProvider: ollama
  session:
    maxHistory: 20
    expireMs: 3600000
  providers:
    ollama:
      host: http://172.25.70.73:11434
      models:
        - qwen3:14b
    openai:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      models:
        - deepseek-ai/deepseek-v3.1
        - z-ai/glm4.7
        - minimaxai/minimax-m2.5
  sessions:
    useDatabase: true
    maxHistory: 50
    expireMs: 3600000
  context:
    enabled: true
    maxMessagesBeforeSummary: 100
    summaryRetentionDays: 30
  agent:
    execSecurity: allowlist
    execAllowlist:
      - ls
      - cat
      - echo
      - whoami
      - pwd
      - date
      - cal
      - clear
      - help
      - man
      - info
      - curl
  maxIterations: 100
  trigger:
    enabled: true
    prefixes:
      - "#"
      - "AI:"
      - "ai:"
    respondToAt: true
    respondToPrivate: true
    ignorePrefixes:
      - /
      - "!"
      - ！
    timeout: 60000
60s:
  apiBase: https://services.zhin.dev
http:
  host: 0.0.0.0
  port: 8086
  token: ${HTTP_TOKEN}
  base: /api
teach:
  maxPerGroup: 200
  cooldown: 3000
  allowRegex: true
  pageSize: 10
