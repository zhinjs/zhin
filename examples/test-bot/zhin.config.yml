log_level: 1
database:
  dialect: sqlite
  filename: ./data/test.db
bots:
  - context: icqq
    name: ${ICQQ_ACCOUNT}
    password: ${ICQQ_PASSWORD}
    platform: ${ICQQ_PLATFORM}
    sign_api_addr: ${ICQQ_SIGN_API_ADDR}
    ver: 9.1.70
    data_dir: ./data
    scope: icqqjs
  - context: github
    name: zhin-github
    app_id: ${GITHUB_APP_ID}
    private_key: ./data/zhin-connect.pem
    webhook_secret: ${GITHUB_WEBHOOK_SECRET}
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
plugin_dirs:
  - node_modules
  - ./src/plugins
services:
  - process
  - config
  - command
  - component
  - permission
  - cron
plugins:
  - test-plugin
  - test-jsx
  - "@zhin.js/http"
  - "@zhin.js/console"
  - "@zhin.js/mcp"
  - "@zhin.js/adapter-github"
  - "@zhin.js/adapter-sandbox"
  - "@zhin.js/adapter-kook"
  - "@zhin.js/adapter-milky"
  - "@zhin.js/adapter-satori"
  - "@zhin.js/adapter-onebot11"
  - "@zhin.js/adapter-onebot12"
  - "@zhin.js/adapter-qq"
  - html-test
  - "@zhin.js/plugin-html-renderer"
  - "@zhin.js/plugin-group-daily-analysis"
  - "@zhin.js/plugin-60s"
  - "@zhin.js/plugin-teach"
console:
  enabled: true
  lazyLoad: true
inbox:
  enabled: true
group-daily-analysis:
  analysisDays: 1
  autoAnalysisEnabled: true
  autoAnalysisCron: 0 9 * * *
  enabledGroups: []
  disabledGroups: []
  outputFormat: text
  maxMessagesPerAnalysis: 500
ai:
  enabled: true
  defaultProvider: openai
  session:
    maxHistory: 20
    expireMs: 3600000
  providers:
    ollama:
      host: http://172.25.70.73:11434
      models:
        - qwen3:14b
    openai:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      models:
        - cu/default
  sessions:
    maxHistory: 200                    # 最大历史消息数
    expireMs: 604800000                # 会话过期: 7 天
    useDatabase: true  
  context:
    enabled: true
    maxRecentMessages: 100             # 读取最近消息数
    summaryThreshold: 50               # 触发自动总结的阈值
    keepAfterSummary: 10               # 总结后保留最近条数
    maxContextTokens: 4000   
  agent:
    # Bash 执行安全（6 层纵深防御）
    execSecurity: allowlist            # deny=禁止 | allowlist=白名单 | full=不限制
    execPreset: network                # 预设白名单集，与 execAllowlist 合并
    #   readonly:    ls cat pwd date whoami grep find head tail wc stat file
    #   network:     + curl wget ping dig nslookup host
    #   development: + npm npx node git gh python python3 pip pnpm yarn tsc bun
    execAllowlist:                     # 自定义追加白名单（支持正则）
      - echo
      - sort
      - uniq
      - awk
      - sed
      - jq
      - tar
      - zip
      - unzip
      - du
      - df
      - env
      - uname
      - which
      - xargs
      - "^docker (ps|logs|inspect)"    # 只允许 docker 只读操作
    execAsk: true                      # 未匹配白名单 → 私聊 Owner 审批
    # disabledTools: []                # 禁用的工具名列表
    # allowedTools: []                 # 仅允许的工具名列表（与 disabledTools 二选一）
  trigger:
    enabled: true
    prefixes: ['#', 'AI:', 'ai:']     # 触发前缀
    respondToAt: true                  # 响应 @机器人
    respondToPrivate: true             # 响应私聊
    ignorePrefixes: ['/', '!', '！']   # 忽略命令前缀
    timeout: 60000                     # AI 响应超时 (ms)
    thinkingMessage: '🤔 思考中...'  # 可选: 处理前发送提示

htmlRenderer:
  defaultWidth: 1080
  defaultBackgroundColor: "#ffffff"
  cacheFonts: true
60s:
  apiBase: https://services.zhin.dev
http:
  host: 0.0.0.0
  port: 8086
  token: ${HTTP_TOKEN}
  base: /api
teach:
  maxPerGroup: 200
  cooldown: 3000
  allowRegex: true
  pageSize: 10
