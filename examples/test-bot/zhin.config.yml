log_level: 1
database:
  dialect: sqlite
  filename: ./data/test.db
bots:
  - context: icqq
    name: "8596238"
    scope: icqqjs
    rpc:
      host: 127.0.0.1
      port: 64130
      token: ${ICQQ_RPC_TOKEN}
  - context: github
    name: zhin-github
    app_id: ${GITHUB_APP_ID}
    private_key: ${GITHUB_PRIVATE_KEY}
    # 生产环境：配置 webhook_secret 启用实时推送
    # webhook_secret: ${GITHUB_WEBHOOK_SECRET}
    # webhook_path: /github/webhook
    # 开发环境：使用轮询（不配置 webhook_secret 自动启用）
    poll_interval: 60
plugin_dirs:
  - node_modules
  - ./src/plugins
services:
  - process
  - config
  - command
  - component
  - permission
  - cron
plugins:
  - test-plugin
  - test-jsx
  - github-commands
  - "@zhin.js/http"
  - "@zhin.js/console"
  - "@zhin.js/mcp"
  - "@zhin.js/adapter-icqq"
  - "@zhin.js/adapter-github"
  - "@zhin.js/adapter-sandbox"
  - "@zhin.js/adapter-kook"
  - "@zhin.js/adapter-milky"
  - "@zhin.js/adapter-satori"
  - "@zhin.js/adapter-onebot11"
  - "@zhin.js/adapter-onebot12"
  - "@zhin.js/adapter-qq"
  - html-test
  - "@zhin.js/plugin-html-renderer"
  - "@zhin.js/plugin-group-daily-analysis"
  - "@zhin.js/plugin-60s"
  - "@zhin.js/plugin-teach"
console:
  enabled: true
  lazyLoad: true
inbox:
  enabled: true
group-daily-analysis:
  analysisDays: 1
  autoAnalysisEnabled: true
  autoAnalysisCron: 0 9 * * *
  enabledGroups: []
  disabledGroups: []
  outputFormat: text
  maxMessagesPerAnalysis: 500
ai:
  enabled: true
  defaultProvider: openai
  session:
    maxHistory: 20
    expireMs: 3600000
  providers:
    ollama:
      host: http://172.25.70.73:11434
    openai:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
  sessions:
    maxHistory: 200
    expireMs: 604800000
    useDatabase: true
  context:
    enabled: true
    maxRecentMessages: 100
    summaryThreshold: 50
    keepAfterSummary: 10
    maxContextTokens: 4000
  agent:
    chatModel: nvidia/moonshotai/kimi-k2.5
    visionModel: qw/vision-model
    execSecurity: allowlist
    execPreset: network
    execAllowlist:
      - echo
      - sort
      - uniq
      - awk
      - sed
      - jq
      - tar
      - zip
      - unzip
      - du
      - df
      - env
      - uname
      - which
      - xargs
      - ^docker (ps|logs|inspect)
    execAsk: true
  trigger:
    enabled: true
    prefixes:
      - "#"
      - "AI:"
      - "ai:"
    respondToAt: true
    respondToPrivate: true
    ignorePrefixes:
      - /
      - "!"
      - ！
    timeout: 60000
    thinkingMessage: 🤔 思考中...
htmlRenderer:
  defaultWidth: 1080
  defaultBackgroundColor: "#ffffff"
  cacheFonts: true
60s:
  apiBase: https://services.zhin.dev
http:
  host: 0.0.0.0
  port: 8086
  token: ${HTTP_TOKEN}
  base: /api
teach:
  maxPerGroup: 200
  cooldown: 3000
  allowRegex: true
  pageSize: 10
