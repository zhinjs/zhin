# Assistant Profile — 仅运行时（Job / 默认 notify / HA 别名）
# 不填 persona/agents/tools：Bootstrap 回退 SOUL.md / AGENTS.md / TOOLS.md（项目增量，勿重复 Orchestration）
version: 1

defaults:
  notify:
    channel: im
    target:
      channel: im
      scene:
        platform: icqq
        endpointId: "8596238"
        sceneId: "1659488338"
        kind: private
  notifyOnFailure: false

routines:
  heartbeat:
    enabled: true
    everyMs: 1800000
    notify:
      channel: silent
  weatherReport:
    enabled: true
    scheduleKind: workday
    cron: "0 0 9 * * *"
    prompt: |
      查询成都市今天的天气情况，用 web_search 获取最新天气信息，生成简洁天气早报（温度、天气状况、风速、湿度等），使用中文回复。
    notify:
      channel: im

# 需 assistant.home.enabled + HA 凭证
devices:
  客厅灯: light.living_room
