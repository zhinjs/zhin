log_level: info

http:
  token: ${HTTP_TOKEN:-full-bot-dev-token}
  port: 8069

database:
  dialect: sqlite
  filename: ./data/full-bot.db

mcp:
  enabled: true
  path: /mcp
  token: ${HTTP_TOKEN:-full-bot-dev-token}
  allowUnauthenticatedLocalhost: false

a2a:
  enabled: true
  path: /a2a

ai:
  enabled: true
  # --- 可选多模态（需 optional peer，见 docs/advanced/ai-content-chain.md）---
  # multimodal:
  #   audio:
  #     strategy: transcribe   # 需 @zhin.js/speech
  memory:
    semantic:
      enabled: true
      autoConsolidate: false
  remoteAgents:
    - id: local
      cardUrl: http://127.0.0.1:8069/a2a/zhin/.well-known/agent-card.json
      token: ${HTTP_TOKEN:-full-bot-dev-token}
  providers:
    ollama:
      sdk: ollama
      host: http://127.0.0.1:11434
  agents:
    zhin:
      provider: ollama
      model: qwen3:8b
  agent:
    execSecurity: allowlist
    execPreset: readonly
  trigger:
    prefixes:
      - "ai:"
    respondToAt: true
    respondToPrivate: true

# speech:
#   stt:
#     provider: ollama
#     model: whisper
#   tts:
#     provider: edge
# htmlRenderer:
#   width: 540

# Root 与 child Plugin 配置严格按 manifest topology 分层。
plugin: {}

plugins:
  sandbox:
    endpoints:
      - context: sandbox
        name: full-bot-sandbox
        owner: local-user
  napcat:
    connection: ws
    endpoints:
      - name: full-bot-napcat
        url: ${ONEBOT11_WS_URL}
        access_token: ${ONEBOT11_ACCESS_TOKEN}
  kook:
    connection: websocket
    endpoints:
      - name: full-bot-kook
        token: ${KOOK_TOKEN}
