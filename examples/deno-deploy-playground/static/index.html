<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zhin · Deno Deploy Playground</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --cmd: #22c55e;
      --ai: #a855f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header p { margin: 0.25rem 0 0; font-size: 0.8rem; color: var(--muted); }
    .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .badge.on { border-color: var(--cmd); color: var(--cmd); }
    .badge.off { color: var(--muted); }
    main {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem 1rem;
    }
    #log {
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 280px;
      max-height: calc(100vh - 200px);
    }
    .msg {
      max-width: 92%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .msg .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .msg.bot.command .meta { color: var(--cmd); }
    .msg.bot.ai .meta { color: var(--ai); }
    form {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    input {
      flex: 1;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 0.95rem;
    }
    button {
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.75rem;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Zhin · Deno Deploy Playground</h1>
      <p>真实 <strong>zhin.js</strong> 运行时：Plugin · MessageCommand · MessageDispatcher · initAgentModule</p>
    </div>
    <span id="status" class="badge off">未连接</span>
  </header>
  <main>
    <div id="log" aria-live="polite"></div>
    <form id="form">
      <input id="input" type="text" placeholder="help · zt · # 你好 · 私聊即 AI…" autocomplete="off" disabled />
      <button type="submit" id="send" disabled>发送</button>
    </form>
  </main>
  <footer>
    <a href="https://docs.deno.com/deploy/getting_started/" target="_blank" rel="noopener">Deno Deploy 文档</a>
    ·
    <a href="https://github.com/zhinjs/zhin" target="_blank" rel="noopener">Zhin.js</a>
  </footer>
  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const input = document.getElementById('input');
    const form = document.getElementById('form');
    const sendBtn = document.getElementById('send');

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws`);

    function append(role, text, meta) {
      const el = document.createElement('div');
      el.className = `msg ${role}${meta ? ' ' + meta : ''}`;
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        el.appendChild(m);
      }
      el.appendChild(document.createTextNode(text));
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    ws.onopen = () => {
      status.textContent = '已连接';
      status.className = 'badge on';
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    };
    ws.onclose = () => {
      status.textContent = '已断开';
      status.className = 'badge off';
      input.disabled = true;
      sendBtn.disabled = true;
    };
    function contentToText(content) {
      if (!content) return '';
      if (typeof content === 'string') return content;
      if (!Array.isArray(content)) return String(content);
      return content.map((seg) => {
        if (typeof seg === 'string') return seg;
        if (seg?.type === 'text') return seg.data?.text ?? '';
        return '';
      }).join('');
    }

    ws.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        const text = contentToText(data.content ?? data.text);
        if (!text && data.type !== 'ready') return;
        if (data.type === 'ready') {
          append('bot', text, 'system');
          return;
        }
        if (data.type === 'error') {
          append('bot', text, 'error');
          return;
        }
        const meta = data.context === 'playground' ? 'zhin.js reply' : (data.route || 'reply');
        append('bot', text, meta);
      } catch (e) {
        append('bot', String(ev.data), 'raw');
      }
    };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      append('user', text);
      ws.send(JSON.stringify({
        type: 'private',
        id: 'playground-user',
        content: [{ type: 'text', data: { text } }],
        timestamp: Date.now(),
      }));
      input.value = '';
    });
  </script>
</body>
</html>
