log_level: 1

# 无需在 yaml 中配置 sandbox bot：Remote Console 打开「沙盒」页并通过 /sandbox WebSocket 连接时自动创建（如 sandbox-xxxx）
bots: []

plugins:
  - "@zhin.js/adapter-sandbox"
  - "@zhin.js/host-router"
  - "@zhin.js/host-api"
  - hello

hostApi:
  lazyLoad: true

ai:
  enabled: true
  providers:
    ollama:
      api: ollama-chat
      host: http://127.0.0.1:11434
  agents:
    zhin:
      provider: ollama
      model: qwen3:8b
  agent:
    execSecurity: allowlist
    execPreset: readonly
  trigger:
    prefixes:
      - "ai:"
    respondToAt: true
    respondToPrivate: true

http:
  token: ${HTTP_TOKEN:-minimal-dev-token}
  port: 8068
