name: Nightly smoke

# Full L4 + durable checks (ADR 0014). PR CI uses check:l4-ci (subset) via check:all.

on:
  schedule:
    - cron: '0 16 * * *' # 00:00 CST
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true
  L4_SKIP_PLATFORM: '1'

jobs:
  l4:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 9.0.2

      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: install dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build packages
        run: pnpm build

      - name: full L4 check
        run: pnpm check:l4
