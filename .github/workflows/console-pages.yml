name: Console GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/console-app/**"
      - "packages/console-core/**"
      - "packages/console-types/**"
      - "packages/client/client/**"
      - "plugins/services/console/**"
      - "plugins/adapters/*/client/**"
      - ".github/workflows/console-pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: console-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build console workspace dependencies
        run: |
          pnpm --filter @zhin.js/console-types build
          pnpm --filter @zhin.js/console-core build
          pnpm --filter @zhin.js/client build

      - name: Build console client (SPA fallback; optional base/CNAME)
        env:
          # Empty = site root — use with custom domain (e.g. https://console.zhin.dev).
          # For https://<user>.github.io/<repo>/ only, set repo variable CONSOLE_PAGES_BASE=/zhin
          CONSOLE_PAGES_BASE: ${{ vars.CONSOLE_PAGES_BASE || '' }}
          CONSOLE_PAGES_CNAME: ${{ vars.CONSOLE_PAGES_CNAME || 'console.zhin.dev' }}
        run: |
          pnpm --filter @zhin.js/console-app run build:web
          node packages/console-app/scripts/prepare-github-pages.mjs

      - name: Locate dist
        id: dist
        run: |
          for d in packages/console-app/dist plugins/services/console/client/dist; do
            if [ -f "$d/index.html" ]; then
              echo "path=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No console dist found" >&2
          exit 1

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.path }}

      - id: deployment
        uses: actions/deploy-pages@v4
