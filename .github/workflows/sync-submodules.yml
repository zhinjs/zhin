# 当 plugins 或 docs 子仓库更新时，自动更新主仓库的 submodule 引用
name: Sync Submodules

on:
  # 通过 repository_dispatch 从子仓库触发
  repository_dispatch:
    types: [submodule-updated]
  # 每天定时同步
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: |
          git submodule update --remote plugins
          git submodule update --remote docs
          git submodule update --remote basic/cli
          git submodule update --remote basic/database
          git submodule update --remote basic/logger
          git submodule update --remote basic/schema

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR for submodule update
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          BRANCH="chore/sync-submodules-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add plugins docs basic
          git commit -m "chore: sync submodules to latest"
          git push origin "$BRANCH"
          
          gh pr create \
            --title "chore: sync submodules to latest" \
            --body "自动同步 plugins、docs 和 basic/* submodule 到最新版本。" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
