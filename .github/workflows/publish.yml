name: Build and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

env:
  CI: true

jobs:
  publish:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 9.0.2

      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0

      - name: setup node.js with npm registry
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
    
      - name: configure github packages auth
        if: env.NPM_TOKEN != ''
        run: echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: install dependencies
        run: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: build packages
        run: pnpm build

      # type-check / lint / unit tests 已纳入 pnpm check:all
      - name: run harness checks (incl. type-check, lint, test)
        run: pnpm check:all

      - name: init new packages (first-time publish)
        run: node scripts/init-new-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: bump versions and publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm bump
          commit: "chore: update versions"
          title: "chore: update versions"
          publish: pnpm pub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
