name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 9.0.2

      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0

      - name: setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # changesets `baseBranch: main` compares against a **local** `main` ref; PR checkouts
      # often only have `origin/main`, which makes `pnpm changeset status` fail.
      - name: sync local main ref for changesets
        if: github.event_name == 'pull_request'
        run: git fetch origin main:main

      - name: configure github packages auth
        if: env.NPM_TOKEN != ''
        run: echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: install dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: audit dependencies
        run: pnpm audit --prod || true

      - name: check changeset
        if: matrix.node-version == 24 && github.head_ref != 'changeset-release/main' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'chore/deps-')
        run: pnpm changeset status

      - name: build packages
        run: pnpm build

      - name: type check
        if: matrix.node-version == 24
        run: pnpm type-check

      - name: lint
        if: matrix.node-version == 24
        run: pnpm lint

      - name: harness checks
        if: matrix.node-version == 24
        run: pnpm check:all

      - name: run tests with coverage
        if: matrix.node-version == 24
        run: pnpm vitest run --reporter=verbose --coverage

      - name: run tests (other node versions)
        if: matrix.node-version != 24
        run: pnpm vitest run

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.node-version == 24 }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
