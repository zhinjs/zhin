name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4
        with:
          version: 9.0.2
      
      - name: setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
      
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      # changesets `baseBranch: main` compares against a **local** `main` ref; PR checkouts
      # often only have `origin/main`, which makes `pnpm changeset status` fail.
      - name: sync local main ref for changesets
        run: git fetch origin main:main
      
      - name: configure github packages auth
        if: env.NPM_TOKEN != ''
        run: echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: install dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: check changeset
        run: pnpm changeset status
      
      - name: build packages
        run: pnpm build

      - name: harness IM send-path check
        run: pnpm check:harness-paths

      - name: check plugins do not import koa
        run: pnpm check:no-koa
      
      - name: run tests
        run: pnpm test:reporter
      
      - name: generate coverage reports
        run: pnpm test:coverage
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
