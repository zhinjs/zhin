name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4
        with:
          version: 9.0.2

      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      - name: setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          cache: 'pnpm'

      # changesets `baseBranch: main` compares against a **local** `main` ref; PR checkouts
      # often only have `origin/main`, which makes `pnpm changeset status` fail.
      - name: sync local main ref for changesets
        run: git fetch origin main:main
      
      - name: configure github packages auth
        if: env.NPM_TOKEN != ''
        run: echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: install dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: check changeset
        run: pnpm changeset status
      
      - name: build packages
        run: pnpm build

      - name: type check
        run: pnpm type-check

      - name: lint
        run: pnpm lint

      - name: harness IM send-path check
        run: pnpm check:harness-paths

      - name: check plugins do not import koa
        run: pnpm check:no-koa

      - name: check production config
        run: pnpm check:prod

      - name: check plugin spec
        run: pnpm check:plugin

      - name: check architecture layers
        run: pnpm check:architecture

      - name: check documentation links
        run: pnpm check:doc-links

      - name: check documentation orphans
        run: pnpm check:doc-orphans

      - name: check readme exports
        run: pnpm check:readme-exports

      - name: check config docs alignment
        run: pnpm check:config-docs

      - name: check adapter docs sync
        run: pnpm check:adapter-docs

      - name: stable path smoke
        run: pnpm check:stable

      - name: L4 full-dimension check
        run: pnpm check:l4
        env:
          L4_SKIP_PLATFORM: "1"

      - name: usePlugin top-level check
        run: pnpm check:use-plugin-top-level
      
      - name: run tests with coverage
        run: pnpm vitest run --reporter=verbose --coverage
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
