name: Update Plugin Registry

on:
  schedule:
    # 每周一和周四 UTC 06:00（北京时间 14:00）
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6 # v6

      - uses: actions/setup-node@v6 # v6.2.0
        with:
          node-version: 24

      - name: Fetch plugin data from npm
        run: node scripts/update-plugins.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/public/plugins.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/public/plugins.json
          git commit -m "chore: update plugin registry [skip ci]"
          git push
