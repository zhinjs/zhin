name: Next Runtime Size

on:
  pull_request:
    paths:
      - 'packages/next/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/next-runtime-size.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/next/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/next-runtime-size.yml'

permissions:
  contents: read

jobs:
  production-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 9.0.2

      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: setup node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: enforce production install budget
        run: pnpm --filter @zhin.js/next-runtime check:size
