<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zhin.js 在线 Demo</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #f6f7f9; }
    body { margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    header a.cta { margin-left: auto; background: #2563eb; color: #fff; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    main { flex: 1; display: flex; flex-direction: column; }
    #status { padding: 8px 20px; font-size: 14px; color: #555; }
    iframe { flex: 1; border: 0; width: 100%; min-height: 70vh; background: #fff; }
  </style>
</head>
<body>
  <header>
    <strong>Zhin.js Demo</strong>
    <span>命令 <code>hello</code> · AI <code>ai:</code> 前缀</span>
    <a class="cta" href="https://zhin.js.org/getting-started/" target="_blank" rel="noopener">本地部署 npm create zhin-app</a>
  </header>
  <div id="status">正在连接 Sandbox…</div>
  <main id="main"></main>
  <script type="module" src="./boot.js"></script>
</body>
</html>
