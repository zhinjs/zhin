events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=demo_api:10m rate=30r/m;

  upstream zhin_host {
    server host:8086;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 443 ssl http2;
    server_name demo-api.zhin.dev;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;

    location / {
      limit_req zone=demo_api burst=20 nodelay;
      proxy_pass http://zhin_host;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl http2;
    server_name demo.zhin.dev;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;

    root /usr/share/nginx/demo-console;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 80;
    server_name demo.zhin.dev demo-api.zhin.dev;
    return 301 https://$host$request_uri;
  }
}
