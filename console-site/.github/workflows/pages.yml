name: Deploy Console to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zhin-console-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Require synced UI (client/ + console-ui/)
        run: |
          test -f client/main.tsx || (echo "Run: node scripts/sync-from-zhin.mjs (from zhin monorepo) and commit client/ + console-ui/" >&2; exit 1)
          test -d console-ui/src || (echo "Missing console-ui/src — sync from zhin monorepo" >&2; exit 1)

      - name: Build + SPA fallback
        env:
          CONSOLE_PAGES_BASE: ${{ vars.CONSOLE_PAGES_BASE || '' }}
          CONSOLE_PAGES_CNAME: ${{ vars.CONSOLE_PAGES_CNAME || 'console.zhin.dev' }}
        run: |
          pnpm build
          node scripts/prepare-github-pages.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
