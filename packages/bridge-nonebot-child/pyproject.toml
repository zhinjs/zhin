[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bridge-nonebot-child"
version = "0.0.1"
description = "Bridge v1 reference NoneBot2 child: O1 plugin allowlist, IPC hello/dispatch, outbound_intent + dispatch_result"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "nonebot2>=2.3,<3",
  "nonebot-adapter-console>=0.9,<0.11",
]

[project.scripts]
zhin-bridge-nonebot-child = "bridge_nonebot_child.__main__:main_sync"

[tool.hatch.build.targets.wheel]
packages = ["src/bridge_nonebot_child"]

[tool.hatch.build.targets.sdist]
include = ["src/bridge_nonebot_child", "README.md", "requirements.txt"]
